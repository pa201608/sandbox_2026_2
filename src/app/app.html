<main *transloco="let t">
  <nav>
    <button
      [class.active]="currentLang() === 'de'"
      (click)="switchLang('de')">DE</button>
    <button
      [class.active]="currentLang() === 'en'"
      (click)="switchLang('en')">EN</button>
  </nav>

  <h1>{{ t('TITLE') }}</h1>
  <p>{{ t('DESCRIPTION') }}</p>
</main>
